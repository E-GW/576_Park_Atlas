<!DOCTYPE html>

<head lang="en">

    <title> WI Park Atlas</title>

    <!--meta for browser (allow for mobile 1st dx)-->
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- import css and libraries for esri.js-->
    <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.26/"></script>

    <!-- esri.js modules needed -->
    <script>  
        require([
        "esri/config","esri/Map","esri/views/MapView","esri/widgets/BasemapGallery","esri/widgets/Expand","esri/widgets/Locate","esri/widgets/Search",
        // new modules for graphics (*refrence lab 2 part 3)
        "esri/Graphic",  "esri/layers/GraphicsLayer",
        // module for feature layer (*reference lab 2 part 4)
        "esri/layers/FeatureLayer",
        // module for editing (*reference lab 3 part 3)
        "esri/widgets/Editor","esri/widgets/Legend"
    ], function(esriConfig, Map, MapView, BasemapGallery, Expand, Locate, Search, Graphic, GraphicsLayer, FeatureLayer, Editor, Legend) {   
        
        // my esri api key
        esriConfig.apiKey = "AAPTxy8BH1VEsoebNVZXo8HurBvZ7IXFuSOhRBuDgv645DOBpnCJ2vtGJsSqd0m31lu7G8oTSCniq7WBlH5N3K2i5Kk1zQ90Yxo4NRi0pv9a9tVhNCaTXh4UYBVSuMTZ4n-VHPYlh3hbIHglPgtC4dS9xt9DvdwtH300t76D_qaoPY1hHx-ZWazuU7A71NQteoVL5YMZ3d0qyiM8FhAB_8wsn9Lfxg-Z0qlqMFoRqQ2XStDdlWe0dU69PsLBWTeob7thAT1_t2Pq0hM2"
        
        const map = new Map({       // constructor to make map
        basemap: "topo",            // *** update basemap for design
        });
        
        const view = new MapView({  // set map view
        map: map,
        center: [-89.8173, 44.6536], 
        zoom: 7,                    // ***(set initial scale instead for more precision?)
        container: "viewDiv"        // div element
        });                         // *** intention to limit extend to WI only
                                    
        const basemapGallery = new BasemapGallery({ //default basemap gallery widget
        view: view,
        });
        // *** probably remove basemap gallery expand tab
        // *** move +/- zoom buttons??
        const expand = new Expand({ //put basemap gallery widget in an expandable tab 
            view: view,
            content: basemapGallery 
        });
        view.ui.add(expand, "top-right"); //set expandable tab in top-right of map

        const locate = new Locate({ //locate Widget
        view: view
        });
        view.ui.add(locate, {
        position: "bottom-left" //set locate widget in bottom-left of map
        });
    
        const search = new Search({ //search Widget
        view: view
        });
        view.ui.add(search, {
        position: "top-left", //set search widget in top-left of map
        index: 2
        });


        const popup_wiParks = {
        "title": "Park Information",
        "content": "<b>Name:</b> {NAME}<br> <b>Type:</b> {FEATTYPE} <br> <b>Area:</b> {SQMI} square miles"
        };
         //adding the Const for the feature layer
        const wiParksLayer = new FeatureLayer({
        url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_Detailed_Parks/FeatureServer",
        //adding the popup here
        popupTemplate: popup_wiParks
        });
        //adding the feature layer to the map
        map.add(wiParksLayer);


    });  
    </script>

     <!-- css style for full screen map -->
    <style>

        body,  
        #viewDiv {

        margin: 0;  
        height: 100%;

        }  
    </style>

</head>
